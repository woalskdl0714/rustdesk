name: build-custom-rustdesk-mac

# 커스텀 RustDesk (macOS) 빌드
# - 우리 서버(158.247.247.248) + 공개키를 소스에 박아넣음 -> 사용자는 ID/비번만으로 접속
# - 라벨(Office1,Home1...)마다 .app 하나씩 생성. 프로세스명 = <라벨>, 창/앱 제목 = <라벨>
# - 커스텀 아이콘(custom-assets/icon_512.png)을 빌드 중 자동 생성해서 적용
# - Apple Silicon(M1~M4) / Intel Mac 선택 빌드 (기본: Apple)
# 실행: Actions 탭 -> 이 워크플로우 -> Run workflow -> labels + arch 선택 -> Run
#
# ⚠️ 코드서명/공증(Apple Developer 계정) 없음 -> Gatekeeper 경고 뜸.
#    실행법은 SETUP_GUIDE.md 의 macOS 섹션 참고 (우클릭 열기 / xattr 제거).

on:
  workflow_dispatch:
    inputs:
      labels:
        description: '기기 라벨 (쉼표구분, 영문/숫자만). 예: Office1,Home1'
        default: 'Office1,Home1'
        required: true
      arch:
        description: 'Mac CPU: apple(M1~M4) / intel / both'
        type: choice
        options:
          - apple
          - intel
          - both
        default: apple
        required: true

env:
  RUSTDESK_TAG: "1.4.9"
  # 우리 자체 서버 (비밀 아님 - 서버IP + 공개키)
  MY_SERVER: "158.247.247.248"
  MY_PUB_KEY: "LEMjSgFj82Wasor3b+cd4ydvBeYmVLILr02UfIcSncs="

jobs:
  # 입력받은 labels + arch 를 (라벨 x 아키텍처) 조합 매트릭스로 변환
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          set -e
          IFS=',' read -ra ARR <<< "${{ github.event.inputs.labels }}"
          labels=$(printf '%s\n' "${ARR[@]}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' | jq -R . | jq -s -c .)
          case "${{ github.event.inputs.arch }}" in
            apple) archs='["apple"]';;
            intel) archs='["intel"]';;
            both)  archs='["apple","intel"]';;
            *)     archs='["apple"]';;
          esac
          combo=$(jq -c -n --argjson labels "$labels" --argjson archs "$archs" '
            [ $labels[] as $l | $archs[] as $a |
              {label:$l, arch:$a} +
              (if $a=="apple"
                 then {runner:"macos-14", target:"aarch64-apple-darwin", triplet:"arm64-osx", extra:"--screencapturekit"}
                 else {runner:"macos-13", target:"x86_64-apple-darwin", triplet:"x64-osx",  extra:""} end)
            ]')
          echo "matrix={\"include\":$combo}" >> "$GITHUB_OUTPUT"
          echo "matrix -> {\"include\":$combo}"

  build-macos:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout RustDesk ${{ env.RUSTDESK_TAG }}
        uses: actions/checkout@v4
        with:
          repository: rustdesk/rustdesk
          ref: ${{ env.RUSTDESK_TAG }}
          submodules: recursive

      - name: Checkout this fork (custom assets)
        uses: actions/checkout@v4
        with:
          path: _custom

      - name: Inject our server, key, and app name (${{ matrix.label }})
        shell: bash
        run: |
          set -e
          f=libs/hbb_common/src/config.rs
          # macOS 의 sed 는 -i 뒤에 확장자 인자가 필요 -> '' 사용
          sed -i '' -E "s|pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*\];|pub const RENDEZVOUS_SERVERS: \&[\&str] = \&[\"${MY_SERVER}\"];|" "$f"
          sed -i '' -E "s|pub const RS_PUB_KEY: &str = \".*\";|pub const RS_PUB_KEY: \&str = \"${MY_PUB_KEY}\";|" "$f"
          sed -i '' "s|RwLock::new(\"RustDesk\".to_owned())|RwLock::new(\"${{ matrix.label }}\".to_owned())|" "$f"
          echo "======== verify (must show our values) ========"
          grep -nE 'RENDEZVOUS_SERVERS|RS_PUB_KEY|APP_NAME: RwLock' "$f"
          grep -q "${MY_SERVER}" "$f" || { echo "ERROR: server not injected"; exit 1; }
          grep -q "RwLock::new(\"${{ matrix.label }}\"" "$f" || { echo "ERROR: app name not injected"; exit 1; }

      - name: Replace macOS app icon (from icon_512.png)
        shell: bash
        run: |
          set -e
          SRC=_custom/custom-assets/icon_512.png
          ICONSET=flutter/macos/Runner/Assets.xcassets/AppIcon.appiconset
          if [ -f "$SRC" ] && [ -d "$ICONSET" ]; then
            for s in 16 32 64 128 256 512 1024; do
              sips -z $s $s "$SRC" --out "$ICONSET/app_icon_$s.png" >/dev/null
            done
            echo "icon replaced:"; ls -la "$ICONSET"
          else
            echo "WARNING: icon_512.png or appiconset not found -> keeping default icon"
          fi

      - name: Install NASM 2.16.03 (nasm 3.x breaks hwcodec)
        shell: bash
        run: |
          set -e
          sudo rm -f /usr/local/bin/nasm /opt/homebrew/bin/nasm || true
          curl -sSLO https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/macosx/nasm-2.16.03-macosx.zip
          unzip -q nasm-2.16.03-macosx.zip
          echo "$PWD/nasm-2.16.03" >> "$GITHUB_PATH"
          "$PWD/nasm-2.16.03/nasm" -v

      - name: Install brew deps
        run: |
          brew install llvm create-dmg pkg-config yasm cmake ninja wget || true
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.81"
          targets: ${{ matrix.target }}
          components: rustfmt

      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: /Users/runner/vcpkg
          vcpkgGitCommitId: "120deac3062162151622ca4860575a33844ba10b"

      - name: Install vcpkg deps (manifest mode)
        shell: bash
        run: |
          set -e
          "$VCPKG_ROOT/vcpkg" install --triplet ${{ matrix.triplet }} --x-install-root="$VCPKG_ROOT/installed"

      - name: Python build deps
        run: pip3 install --break-system-packages requests argparse || pip3 install requests argparse

      - name: Enable macos desktop
        run: flutter config --enable-macos-desktop

      # Rust<->Dart 브릿지 생성 (윈도우 워크플로우와 동일 버전 고정)
      - name: Generate flutter_rust_bridge
        shell: bash
        run: |
          set -e
          cargo install cargo-expand --version 1.0.95 --locked
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features "uuid" --locked
          (cd flutter && flutter pub get)
          flutter_rust_bridge_codegen \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./flutter/macos/Runner/bridge_generated.h
          echo "=== bridge files (must exist) ==="
          ls -la src/bridge_generated.rs flutter/lib/generated_bridge.dart

      - name: Build (flutter, hwcodec)
        shell: bash
        env:
          VCPKG_ROOT: /Users/runner/vcpkg
        run: |
          set -e
          python3 ./build.py --flutter --hwcodec --unix-file-copy-paste ${{ matrix.extra }}

      - name: Package as ${{ matrix.label }}.app
        shell: bash
        run: |
          set -e
          LABEL="${{ matrix.label }}"
          REL="flutter/build/macos/Build/Products/Release"
          APP="$REL/RustDesk.app"
          if [ ! -d "$APP" ]; then
            echo "ERROR: RustDesk.app not found"; find flutter/build -maxdepth 6 -name '*.app' -print; exit 1
          fi
          # 실행 바이너리 이름 변경 -> 활동 상태 보기(Activity Monitor) 프로세스명 = <라벨>
          mv "$APP/Contents/MacOS/RustDesk" "$APP/Contents/MacOS/$LABEL"
          plutil -replace CFBundleExecutable -string "$LABEL" "$APP/Contents/Info.plist"
          plutil -replace CFBundleName        -string "$LABEL" "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName $LABEL" "$APP/Contents/Info.plist" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string $LABEL" "$APP/Contents/Info.plist"
          # 번들 폴더 이름 변경
          mv "$APP" "$REL/$LABEL.app"
          APP="$REL/$LABEL.app"
          # 애드혹 서명 (Apple Silicon 은 서명 없으면 실행 자체가 안 됨)
          codesign --force --deep --sign - "$APP"
          codesign --verify --deep --strict "$APP" && echo "ad-hoc signed OK"
          # .app 을 zip 으로 (ditto 로 심볼릭링크/메타데이터 보존)
          mkdir -p out
          ditto -c -k --sequesterRsrc --keepParent "$APP" "out/$LABEL-${{ matrix.arch }}.zip"
          ls -la out

      - name: Upload ${{ matrix.label }}-${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}-${{ matrix.arch }}
          path: out/
